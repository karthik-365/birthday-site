<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sorry & Birthday</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: #ff4d6d;
    color: white;
    border-radius: 30px;
    cursor: pointer;
}

/* Collage */
.collage {
    position: fixed;
    width: 100%;
    height: 100%;
    display: none;
    background: radial-gradient(circle, #ffd6d6, #ff9a9e);
}

/* Center video */
.video-box {
    position: absolute;
    width: 60%;              /* ✅ responsive width */
    max-width: 700px;        /* ✅ limit on large screens */
    aspect-ratio: 16 / 9;    /* ✅ PERFECT 16:9 */
    
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    border-radius: 20px;
    overflow: hidden;

    border: 5px solid white;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

.video-box video {
    width: 100%;
    height: 100%;
    object-fit: cover; /* ✅ fills nicely */
}

/* Photos */
.photo {
    position: absolute;
    width: 160px;
    height: 200px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Birthday text */
.message {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 32px;
    color: white;
    font-weight: bold;
    text-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="card" id="card">
    <h1>I'm Sorry Praveena 💔</h1>
    <p>I truly didn't mean to hurt you…<br>Please forgive me 🙏<br>I am idiot for missing forgetting your Birthday</p>
    <button onclick="showCollage()">Tap for Surprise 🎁</button>
</div>

<div class="collage" id="collage">
    <div class="message">🎉 Happy Birthday 💖 🎂<br>Praveena</div>

    <!-- ✅ CENTER VIDEO -->
    <div class="video-box">
        <video autoplay muted loop controls>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Photos -->
    <div class="photo" style="top:15%; left:10%;"><img src="img1.jpeg"></div>
    <div class="photo" style="top:15%; right:10%;"><img src="img2.jpeg"></div>

    <div class="photo" style="bottom:15%; left:10%;"><img src="img3.jpeg"></div>
    <div class="photo" style="bottom:15%; right:10%;"><img src="img4.jpeg"></div>

    <div class="photo" style="top:40%; left:5%;"><img src="img5.jpeg"></div>
    <div class="photo" style="top:40%; right:5%;"><img src="img6.jpeg"></div>

</div>

<script>
function showCollage() {
    document.getElementById("card").style.display = "none";
    document.getElementById("collage").style.display = "block";
}
</script>

</body>
</html>
